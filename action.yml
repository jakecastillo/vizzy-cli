name: vizzy exposure audit
description: >
  Run vizzy --audit over your public repos and upload a SARIF report to
  GitHub Code Scanning. Exits non-zero on danger findings.

inputs:
  github-token:
    description: GitHub token used by vizzy to list repositories.
    required: true
  format:
    description: Output format — sarif (default), json, or text.
    required: false
    default: sarif

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run vizzy exposure audit
      shell: sh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        # Pass the input through the environment, NOT interpolated into the run
        # script — GitHub substitutes ${{ }} into the script text before the
        # shell runs, so interpolating it directly is a script-injection hole.
        FORMAT: ${{ inputs.format }}
      run: |
        case "$FORMAT" in
          sarif|json|text) ;;
          *) echo "vizzy: invalid format '$FORMAT' (expected sarif, json, or text)" >&2; exit 2 ;;
        esac
        npx vizzy-cli@latest --audit --format "$FORMAT" > results.sarif

    # Upload the SARIF report to GitHub Code Scanning — only when the output is
    # actually SARIF (json/text formats produce a non-SARIF file and are skipped).
    # Remove or comment out this step if you do not have Code Scanning enabled.
    - name: Upload SARIF to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v3
      if: always() && inputs.format == 'sarif'
      with:
        sarif_file: results.sarif
