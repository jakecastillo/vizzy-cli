# Release workflow — npm OIDC Trusted Publishing with provenance
# Triggered on version tags (push tags v*).
# STAGED: this file is committed but publishing is a gated human action.
# Do NOT run manually or via workflow_dispatch; the publish step requires
# a version tag and npm Trusted Publishing configured on npmjs.com.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # required for OIDC Trusted Publishing (npm provenance)
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish to npm (OIDC provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
