name: Exposure audit

# Run the exposure audit on a schedule and on pull requests that touch
# security-sensitive paths.  Results are uploaded to GitHub Code Scanning.
on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  pull_request:
    paths:
      - '**.env*'
      - '**/secrets/**'
      - '.github/workflows/**'

permissions:
  contents: read
  security-events: write

jobs:
  exposure-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run vizzy exposure audit
        uses: ./
        with:
          # The default GITHUB_TOKEN authenticates as github-actions[bot], which
          # owns no repos — so audit an org (below), or pass a user PAT here to
          # audit a person's repos. Otherwise the audit silently finds nothing.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: sarif
          # Audit a whole org's public repos (read-only). Remove to audit the
          # token owner's personal repos instead.
          org: your-org
